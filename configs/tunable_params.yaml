# PCB 缺陷检测 - 可调参数配置
# 此文件列出所有可调整的参数，修改后运行 python train_with_logging.py --config configs/tunable_params.yaml

# ============================================================
# 【模型配置】- 可调整
# ============================================================
model:
  name: yolov8s           # 模型大小: n/s/m/l/x
  pretrained: true        # 是否使用预训练权重
  imgsz: 640              # 输入图片尺寸: 320/416/512/640/1280

# ============================================================
# 【数据配置】- 可调整
# ============================================================
data:
  dataset_path: yolo_pcb_dataset
  yaml_path: models/yolov8/data.yaml
  
# ============================================================
# 【训练参数】- 可调整
# ============================================================
train:
  epochs: 100             # 训练轮数: 50/100/200/300
  batch: 16                # 批次大小: 8/16/32/64 (根据显存调整)
  imgsz: 640              # 训练图片尺寸
  patience: 20             # 早停耐心值: 10/20/30
  save_period: 10          # 模型保存频率
  device: 0               # GPU设备: 0/1/2 或 -1 (CPU)

# ============================================================
# 【优化器参数】- 可调整 (关键调参区)
# ============================================================
optimizer:
  name: AdamW             # 优化器: SGD/Adam/AdamW
  lr0: 0.001              # 初始学习率: 1e-2 ~ 1e-5
  lrf: 0.01               # 最终学习率因子: 0.01 ~ 0.2
  momentum: 0.937         # 动量 (SGD): 0.9 ~ 0.999
  weight_decay: 0.0005    # 权重衰减: 0 ~ 0.001
  warmup_epochs: 3        # Warmup轮数: 0 ~ 5

# ============================================================
# 【数据增强参数】- 可调整 (关键调参区)
# ============================================================
augmentation:
  # --- 光学增强 ---
  hsv_h: 0.015           # 色相增强: 0 ~ 0.05
  hsv_s: 0.7              # 饱和度增强: 0 ~ 1.0
  hsv_v: 0.4              # 亮度增强: 0 ~ 0.5
  
  # --- 几何增强 ---
  degrees: 15.0           # 旋转角度: 0 ~ 45
  translate: 0.1          # 平移: 0 ~ 0.5
  scale: 0.5              # 缩放: 0 ~ 1.0
  shear: 0.0              # 剪切: 0 ~ 10
  perspective: 0.0        # 透视变换: 0 ~ 0.001
  flipud: 0.0             # 上下翻转: 0 ~ 1.0
  fliplr: 0.5             # 左右翻转: 0 ~ 1.0
  
  # --- 高级增强 ---
  mosaic: 1.0             # Mosaic: 0 ~ 1.0 (0=关闭)
  mixup: 0.15             # MixUp: 0 ~ 0.5
  copy_paste: 0.1         # CopyPaste: 0 ~ 0.5

# ============================================================
# 【推理参数】- 可调整
# ============================================================
inference:
  conf: 0.25              # 置信度阈值: 0.1 ~ 0.9 (越低检测越多)
  iou: 0.45               # NMS IoU阈值: 0.3 ~ 0.7
  imgsz: 640              # 推理尺寸
  max_det: 300            # 最大检测数

# ============================================================
# 【导出配置】- 可调整
# ============================================================
export:
  format: onnx            # 格式: onnx/torchscript/tflite/engine
  simplify: true          # 简化ONNX
  opset: 12               # ONNX opset版本: 11/12/13/14
  half: false             # FP16量化: true/false

# ============================================================
# 【调参建议】- 不同目标调整策略
# ============================================================
tuning_strategies:
  
  # 策略1: 提升精度
  accuracy_focus:
    description: "适合提升mAP，适合高质量数据集"
    model: "yolov8m"
    epochs: 200
    batch: 8
    lr0: 0.0001
    mosaic: 1.0
    mixup: 0.2
  
  # 策略2: 提升速度
  speed_focus:
    description: "适合边缘部署，适合Jetson/移动端"
    model: "yolov8n"
    epochs: 100
    batch: 32
    imgsz: 416
    lr0: 0.01
  
  # 策略3: 平衡模式
  balanced:
    description: "精度与速度平衡"
    model: "yolov8s"
    epochs: 150
    batch: 16
    lr0: 0.001
    imgsz: 640
  
  # 策略4: 小目标优化
  small_target:
    description: "优化小目标检测"
    model: "yolov8s"
    epochs: 200
    batch: 8
    imgsz: 1280
    lr0: 0.0005
    copy_paste: 0.3
  
  # 策略5: 数据量少
  few_shot:
    description: "数据量少时的训练策略"
    model: "yolov8s"
    epochs: 300
    batch: 16
    lr0: 0.0001
    mosaic: 0.5
    mixup: 0.3
    warmup_epochs: 5
