# YOLOv8 PCB缺陷检测训练配置
# 使用方法: python train_yolov8.py --config configs/train_config.yaml

# 模型配置
model:
  name: yolov8n           # 模型大小: n/s/m/l/x
  pretrained: true        # 使用预训练权重
  imgsz: 640              # 输入图片尺寸

# 数据集配置
data:
  dataset_path: yolo_pcb_dataset
  yaml_path: models/yolov8/data.yaml
  
# 训练参数
train:
  epochs: 30              # 训练轮次
  batch: 16               # 批次大小
  imgsz: 640              # 图片尺寸
  patience: 20            # 早停耐心值
  save_period: 10         # 保存频率
  device: 0               # GPU设备编号 (-1为CPU)
  
# 优化器参数
optimizer:
  name: AdamW
  lr0: 0.001              # 初始学习率
  lrf: 0.01               # 最终学习率因子
  momentum: 0.937         # 动量
  weight_decay: 0.0005    # 权重衰减

# 数据增强
augmentation:
  hsv_h: 0.015           # 色相增强
  hsv_s: 0.7              # 饱和度增强
  hsv_v: 0.4              # 亮度增强
  degrees: 0.0            # 旋转角度
  translate: 0.1          # 平移
  scale: 0.5              # 缩放
  shear: 0.0              # 剪切
  perspective: 0.0        # 透视
  flipud: 0.0             # 上下翻转
  fliplr: 0.5             # 左右翻转
  mosaic: 1.0             # Mosaic增强
  mixup: 0.0              # MixUp增强

# 推理参数
inference:
  conf: 0.25              # 置信度阈值
  iou: 0.45               # NMS IoU阈值
  imgsz: 640              # 推理尺寸
  device: 0               # 推理设备

# 导出配置
export:
  format: onnx            # 导出格式: onnx/torchscript/tflite
  simplify: true          # 简化ONNX
  opset: 12               # ONNX opset版本
  half: false             # FP16量化
