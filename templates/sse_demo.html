<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Vision Client - PCB缺陷检测</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--error);
        }
        
        .status-dot.connected { background: var(--success); }
        .status-dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        
        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Image Display */
        .image-area {
            position: relative;
            min-height: 500px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #preview-image {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
        }
        
        .upload-hint {
            text-align: center;
            color: var(--text-muted);
        }
        
        .upload-hint .icon { font-size: 64px; margin-bottom: 16px; }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Chat */
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
            max-width: 85%;
        }
        
        .message.user {
            background: var(--primary);
            color: #fff;
            margin-left: auto;
        }
        
        .message.assistant {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }
        
        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        
        .btn-primary:hover { opacity: 0.9; }
        
        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
        }
        
        /* File Upload */
        .file-upload {
            margin-bottom: 20px;
        }
        
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(88, 166, 255, 0.1);
        }
        
        .drop-zone input { display: none; }
        
        /* Detections List */
        .detections-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .detection-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .detection-label { color: var(--text); }
        .detection-conf { color: var(--success); font-weight: 600; }
        
        /* Logs */
        .log-area {
            height: 150px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            background: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
        }
        
        .log-entry {
            margin-bottom: 4px;
            color: var(--text-muted);
        }
        
        .log-entry.error { color: var(--error); }
        .log-entry.success { color: var(--success); }
        .log-entry.info { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">👁 SSE Vision Client</div>
            <div class="status">
                <span class="status-dot" id="sse-status"></span>
                <span id="status-text">未连接</span>
            </div>
        </header>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="fps">0</div>
                <div class="stat-label">FPS</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="latency">0</div>
                <div class="stat-label">延迟(ms)</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="detections-count">0</div>
                <div class="stat-label">检测数</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="frames-count">0</div>
                <div class="stat-label">帧数</div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-grid">
            <!-- Left: Image + Upload -->
            <div>
                <div class="card file-upload">
                    <div class="drop-zone" id="drop-zone">
                        <input type="file" id="file-input" accept="image/*,video/*">
                        <div class="upload-hint">
                            <div class="icon">📁</div>
                            <div>拖放图像/视频到这里，或点击选择</div>
                            <div style="margin-top: 8px; font-size: 12px;">支持 JPG, PNG, MP4</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">实时预览</div>
                    <div class="image-area">
                        <img id="preview-image" src="" alt="Preview" style="display: none;">
                        <div class="upload-hint" id="placeholder">
                            <div class="icon">🖼️</div>
                            <div>上传图像开始检测</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right: Chat + Detections -->
            <div>
                <!-- Chat -->
                <div class="card" style="margin-bottom: 20px;">
                    <div class="card-title">💬 AI 对话</div>
                    <div class="chat-messages" id="chat-messages">
                        <div class="message assistant">
                            <div>您好！我是PCB缺陷检测助手，请上传图像或描述您要检测的内容。</div>
                            <div class="message-time">系统</div>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="chat-input" 
                               placeholder="描述图像或提问...">
                        <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                    </div>
                </div>
                
                <!-- Detections -->
                <div class="card" style="margin-bottom: 20px;">
                    <div class="card-title">🔍 检测结果</div>
                    <div class="detections-list" id="detections-list">
                        <div style="color: var(--text-muted); text-align: center; padding: 20px;">
                            暂无检测结果
                        </div>
                    </div>
                </div>
                
                <!-- Logs -->
                <div class="card">
                    <div class="card-title">📋 运行日志</div>
                    <div class="log-area" id="log-area">
                        <div class="log-entry info">[System] SSE Vision Client 已就绪</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ============= 配置 =============
        const API_BASE = 'http://localhost:8000';
        const SSE_ENDPOINT = `${API_BASE}/sse/all`;
        
        // ============= 状态 =============
        let eventSource = null;
        let frameCount = 0;
        let fps = 0;
        let lastFrameTime = Date.now();
        let clientId = null;
        
        // ============= SSE 连接 =============
        function connectSSE() {
            updateStatus('connecting');
            
            eventSource = new EventSource(SSE_ENDPOINT);
            
            eventSource.onopen = () => {
                updateStatus('connected');
                log('SSE 连接已建立', 'success');
            };
            
            eventSource.addEventListener('connected', (e) => {
                const data = JSON.parse(e.data);
                clientId = data.client_id;
                log(`已连接到频道: ${data.channel}`, 'success');
            });
            
            eventSource.addEventListener('detection', (e) => {
                const data = JSON.parse(e.data);
                handleDetection(data);
            });
            
            eventSource.addEventListener('chat', (e) => {
                const data = JSON.parse(e.data);
                handleChat(data);
            });
            
            eventSource.addEventListener('heartbeat', (e) => {
                // 心跳，保持连接
            });
            
            eventSource.onerror = (err) => {
                updateStatus('disconnected');
                log('SSE 连接断开，5秒后重连...', 'error');
                setTimeout(connectSSE, 5000);
            };
        }
        
        function disconnectSSE() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                updateStatus('disconnected');
                log('SSE 连接已关闭', 'info');
            }
        }
        
        function updateStatus(status) {
            const dot = document.getElementById('sse-status');
            const text = document.getElementById('status-text');
            
            dot.className = 'status-dot';
            if (status === 'connected') {
                dot.classList.add('connected');
                text.textContent = '已连接';
            } else if (status === 'connecting') {
                dot.classList.add('connecting');
                text.textContent = '连接中...';
            } else {
                text.textContent = '未连接';
            }
        }
        
        // ============= 处理事件 =============
        function handleDetection(data) {
            frameCount++;
            document.getElementById('frames-count').textContent = frameCount;
            document.getElementById('latency').textContent = data.latency_ms || 0;
            
            // 计算 FPS
            const now = Date.now();
            if (now - lastFrameTime >= 1000) {
                fps = Math.round(frameCount * 1000 / (now - lastFrameTime));
                document.getElementById('fps').textContent = fps;
                lastFrameTime = now;
            }
            
            // 更新检测结果
            document.getElementById('detections-count').textContent = data.count || 0;
            
            const list = document.getElementById('detections-list');
            if (data.detections && data.detections.length > 0) {
                list.innerHTML = data.detections.map(d => `
                    <div class="detection-item">
                        <span class="detection-label">${d.label}</span>
                        <span class="detection-conf">${(d.confidence * 100).toFixed(1)}%</span>
                    </div>
                `).join('');
            }
            
            // 更新预览图
            if (data.image) {
                const img = document.getElementById('preview-image');
                img.src = `data:image/jpeg;base64,${data.image}`;
                img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
            }
            
            log(`检测完成: ${data.count} 个目标`, 'success');
        }
        
        function handleChat(data) {
            const messages = document.getElementById('chat-messages');
            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.innerHTML = `
                <div>${escapeHtml(data.message)}</div>
                <div class="message-time">${new Date().toLocaleTimeString()}</div>
            `;
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }
        
        // ============= 文件上传 =============
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        async function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                log('请上传图像文件', 'error');
                return;
            }
            
            log(`上传文件: ${file.name}`);
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                
                try {
                    const response = await fetch(`${API_BASE}/api/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image: base64,
                            conf: 0.25
                        })
                    });
                    
                    const data = await response.json();
                    handleDetection(data);
                } catch (err) {
                    log(`上传失败: ${err.message}`, 'error');
                }
            };
            reader.readAsDataURL(file);
        }
        
        // ============= 聊天 =============
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            const messages = document.getElementById('chat-messages');
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `
                <div>${escapeHtml(message)}</div>
                <div class="message-time">${new Date().toLocaleTimeString()}</div>
            `;
            messages.appendChild(userMsg);
            messages.scrollTop = messages.scrollHeight;
            
            input.value = '';
            log(`发送消息: ${message.substring(0, 50)}...`);
            
            // 发送到服务器
            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        client_id: clientId
                    })
                });
                
                const data = await response.json();
                handleChat(data);
            } catch (err) {
                log(`发送失败: ${err.message}`, 'error');
            }
        }
        
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // ============= 日志 =============
        function log(message, type = 'info') {
            const logArea = document.getElementById('log-area');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============= 启动 =============
        connectSSE();
        log('SSE Vision Client 已启动');
    </script>
</body>
</html>
